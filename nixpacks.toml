[providers]
node = true
python = true

[phases.setup]
nixPkgs = ["...", "nodejs_20", "python311", "gcc"]

[phases.install]
cmds = [
  "npm install",
  "cd backend && python3 -m venv venv && ./venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "npm start"
